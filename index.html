        let interactiveStars = [];
        let activeLabels = new Map();

        function createTextSprite(message) {
            const canvas = document.createElement('canvas');
            const maxWidth = 1000;
            const lineHeight = 48;
            let fontSize = 48;

            const ctx = canvas.getContext('2d');

            // Medir y ajustar tamaño de fuente si es muy largo
            ctx.font = `bold ${fontSize}px Arial`;
            let textWidth = ctx.measureText(message).width;

            if (textWidth > maxWidth) {
                fontSize = Math.max(38, Math.floor(58 * (maxWidth / textWidth)));
                ctx.font = `bold ${fontSize}px Arial`;
            }

            // Dividir en líneas si sigue siendo largo
            const words = message.split(' ');
            let lines = [];
            let currentLine = words[0];

            for (let i = 1; i < words.length; i++) {
                const testLine = currentLine + ' ' + words[i];
                if (ctx.measureText(testLine).width > maxWidth - 40) {
                    lines.push(currentLine);
                    currentLine = words[i];
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine);

            const totalHeight = lines.length * lineHeight + 60;

            canvas.width = maxWidth;
            canvas.height = totalHeight;

            // Fondo con glow
            ctx.fillStyle = 'rgba(255, 230, 255, 0.97)';
            ctx.shadowColor = '#ff66ff';
            ctx.shadowBlur = 35;

            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            lines.forEach((line, index) => {
                ctx.fillText(line, canvas.width / 2, 40 + index * lineHeight);
            });

            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false
            }));

            // Escala según cantidad de líneas
            const scaleY = Math.max(2.6, lines.length * 0.95);
            sprite.scale.set(10.5, scaleY, 1);

            return sprite;
        }

        function createInteractiveStars(count = 140) {
            const stars = [];
            for (let i = 0; i < count; i++) {
                const size = 0.2 + Math.random() * 0.14;
                const star = new THREE.Mesh(
                    new THREE.SphereGeometry(size, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0xff99ee })
                );

                star.position.x = THREE.MathUtils.randFloatSpread(100);
                star.position.y = THREE.MathUtils.randFloatSpread(75);
                star.position.z = THREE.MathUtils.randFloatSpread(100);

                star.userData = {
                    message: uniqueMessages[i % uniqueMessages.length],
                    pulseSpeed: 1.2 + Math.random() * 2,
                    pulsePhase: Math.random() * Math.PI * 2
                };

                scene.add(star);
                stars.push(star);
            }
            return stars;
        }

        interactiveStars = createInteractiveStars(uniqueMessages.length);
        camera.position.set(0, 10, 22);

        function updateLabels() {
            const cameraDirection = new THREE.Vector3();
            camera.getWorldDirection(cameraDirection);

            interactiveStars.forEach(star => {
                const toStar = new THREE.Vector3().subVectors(star.position, camera.position).normalize();
                const angle = cameraDirection.angleTo(toStar) * (180 / Math.PI);

                if (angle < 28) {
                    if (!activeLabels.has(star)) {
                        const label = createTextSprite(star.userData.message);
                        label.userData.star = star;
                        label.position.copy(star.position);
                        label.position.y += 2.4;
                        scene.add(label);
                        activeLabels.set(star, label);
                    }
                } else {
                    if (activeLabels.has(star)) {
                        scene.remove(activeLabels.get(star));
                        activeLabels.delete(star);
                    }
                }
            });
        }

        // Tap / Click
        function handleTap(event) {
            const touch = event.touches ? event.touches[0] : event;
            const mouse = new THREE.Vector2(
                (touch.clientX / window.innerWidth) * 2 - 1,
                -(touch.clientY / window.innerHeight) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveStars);

            if (intersects.length > 0) {
                const star = intersects[0].object;
                scene.remove(star);
                interactiveStars = interactiveStars.filter(s => s !== star);

                if (activeLabels.has(star)) {
                    scene.remove(activeLabels.get(star));
                    activeLabels.delete(star);
                }
            }
        }

        window.addEventListener('touchstart', handleTap);
        window.addEventListener('click', handleTap);

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            interactiveStars.forEach(star => {
                const pulse = Math.sin(time * star.userData.pulseSpeed + star.userData.pulsePhase) * 0.2 + 1;
                star.scale.setScalar(pulse);
            });

            updateLabels();

            activeLabels.forEach(label => label.lookAt(camera.position));

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
